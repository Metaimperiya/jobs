<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METAIMPERIYA JOBS CHAT</title>

<style>
body{
    margin:0;
    background:#020202;
    color:#fff;
    font-family:Arial;
}

header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #00ff9c;
}

h1{
    color:#00ff9c;
}

.chat{
    max-width:800px;
    margin:20px auto;
    padding:10px;
}

.messages{
    height:400px;
    overflow-y:auto;
    border:1px solid #00ff9c;
    padding:10px;
    margin-bottom:10px;
}

.message{
    margin-bottom:10px;
    padding:10px;
    border-bottom:1px solid #333;
}

.input{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    background:#111;
    border:1px solid #00ff9c;
    color:#fff;
}

button{
    padding:10px;
    background:#00ff9c;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>METAIMPERIYA JOBS</h1>
<p>Пиши объявление сразу — без регистрации</p>
</header>

<div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
        <input type="text" id="msg" placeholder="Напиши вакансию или предложение...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>
</div>

<script>
let messages = JSON.parse(localStorage.getItem("jobs_chat")) || [];

function render(){
    let box = document.getElementById("messages");
    box.innerHTML = "";
    messages.forEach(m=>{
        box.innerHTML += `<div class="message">${m}</div>`;
    });
}

function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    messages.push(input.value);
    localStorage.setItem("jobs_chat", JSON.stringify(messages));

    input.value = "";
    render();
}

render();
</script>

</body>
</html>
