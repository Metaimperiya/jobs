<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METAIMPERIYA JOBS — Global Job Network</title>
<meta name="description" content="METAIMPERIYA JOBS — поиск работы и сотрудников по всему миру в реальном времени.">
<meta name="keywords" content="работа, вакансии, поиск сотрудников, работа онлайн, metaimperiya jobs">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>

:root {
    --green: #00ff9c;
    --cyan: #00e5ff;
    --pink: #ff2bd6;
}

/* ФОН */
body {
    margin: 0;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,229,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,43,214,0.15), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(0,255,156,0.1), transparent 40%),
        #020202;
}

/* GRID EFFECT */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(0,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* HEADER */
header {
    text-align: center;
    padding: 50px 20px;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,156,0.3);
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 8px;
    color: var(--green);

    text-shadow:
        0 0 5px var(--green),
        0 0 15px var(--green),
        0 0 30px rgba(0,255,156,0.6);
}

.tagline {
    color: #888;
    letter-spacing: 3px;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

/* CARD */
.main {
    background: rgba(10,10,20,0.9);
    border-radius: 20px;
    padding: 30px;

    border: 1px solid rgba(0,229,255,0.2);

    box-shadow:
        0 0 20px rgba(0,229,255,0.1),
        0 0 40px rgba(255,43,214,0.08);
}

/* PREVIEW */
.preview {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    margin-bottom: 30px;

    border: 1px solid rgba(0,229,255,0.3);
}

.preview img {
    width: 100%;
}

/* scanlines */
.preview::after {
    content: "";
    position: absolute;
    inset: 0;

    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 1px,
            transparent 2px,
            transparent 4px
        );
}

/* TITLE */
.jobs-header {
    border-left: 4px solid var(--green);
    padding-left: 20px;
    margin-bottom: 25px;
}

.jobs-header h2 {
    font-family: 'Orbitron';
    font-size: 2rem;

    text-shadow: 0 0 10px rgba(0,229,255,0.3);
}

/* WIDGET */
.widget {
    background: rgba(5,10,20,0.95);
    border-radius: 15px;
    padding: 10px;

    border: 1px solid rgba(0,255,156,0.2);
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 50px;
    padding: 40px;
    color: #666;
}

/* ANIMATION */
@keyframes flicker {
    0%,100% { opacity: 1; }
    50% { opacity: 0.85; }
}

h1 {
    animation: flicker 3s infinite;
}

</style>
</head>

<body>

<header>
    <h1>METAIMPERIYA</h1>
    <div class="tagline">GLOBAL JOB NETWORK</div>
</header>

<div class="container">
    <div class="main">

        <div class="preview">
            <img src="preview.jpg">
        </div>

        <div class="jobs-header">
            <h2>LIVE JOB FEED</h2>
            <p>Работа и сотрудники со всего мира в реальном времени.</p>
        </div>

        <div class="widget">
            <script async src="https://comments.app/js/widget.js?3" 
                data-comments-app-id="ВСТАВЬ_ID"
                data-limit="50"
                data-color="00ff9c"
                data-dark="1">
            </script>
        </div>

    </div>
</div>

<footer>
METAIMPERIYA JOBS © 2026
</footer>

</body>
</html>
