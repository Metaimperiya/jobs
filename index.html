<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>METAIMPERIYA AI CHAT</title>

<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial}
header{padding:20px;text-align:center;border-bottom:1px solid #00ff9c}
h1{color:#00ff9c;margin:0}

.chat{max-width:800px;margin:20px auto}
.messages{height:400px;overflow-y:auto;border:1px solid #00ff9c;padding:10px}
.msg{padding:10px;border-bottom:1px solid #222}
.user{color:#00ff9c}
.ai{color:#4da6ff}

.input{display:flex;margin-top:10px}
input{flex:1;padding:12px;background:#111;border:1px solid #00ff9c;color:#fff}
button{padding:12px;background:#00ff9c;border:none;cursor:pointer}
.login{max-width:800px;margin:20px auto;border:1px solid #00ff9c;padding:10px}
</style>
</head>

<body>

<header>
<h1>METAIMPERIYA OPEN CHAT</h1>
</header>

<div class="login">
<input id="name" placeholder="Имя (или оставь пустым = гость)">
<button onclick="login()">ВОЙТИ</button>
<div id="status">Не вошёл</div>
</div>

<div class="chat">
<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Напиши сообщение...">
<button onclick="send()">SEND</button>
</div>
</div>

<script>
let user = localStorage.getItem("user") || null;

function login(){
    let name = document.getElementById("name").value;
    if(!name) name = "Гость_" + Math.floor(Math.random()*9999);

    user = name;
    localStorage.setItem("user", user);
    document.getElementById("status").innerText = "Ты: " + user;
}

if(user){
    document.getElementById("status").innerText = "Ты: " + user;
}

// загрузка чата
let chat = JSON.parse(localStorage.getItem("chat") || "[]");

function render(){
    let box = document.getElementById("messages");
    box.innerHTML = "";

    chat.forEach(m=>{
        box.innerHTML += `<div class="msg">
            <b>${m.user}</b>: ${m.text}
        </div>`;
    });

    box.scrollTop = box.scrollHeight;
}
render();

// fake AI (без API)
function fakeAI(text){
    let answers = [
        "Понял. Опиши подробнее.",
        "Это можно оформить как вакансию.",
        "Добавь детали и зарплату.",
        "Норм идея. Давай усилим.",
        "Сделай SEO описание."
    ];
    return answers[Math.floor(Math.random()*answers.length)];
}

// отправка
function send(){
    let input = document.getElementById("msg");
    let text = input.value;

    if(!text) return;
    if(!user) return alert("Сначала войди");

    chat.push({user:user, text:text});

    // AI ответ
    let ai = fakeAI(text);
    chat.push({user:"METAIMPERIYA_AI", text:ai});

    localStorage.setItem("chat", JSON.stringify(chat));

    input.value="";
    render();
}
</script>

</body>
</html>
