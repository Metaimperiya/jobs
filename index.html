<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAIMPERIYA | Terminal</title>
    <link rel="canonical" href="https://jobs-phi-two.vercel.app">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #F646A4; --bg: #020202; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; color: #fff; font-family: 'Rajdhani', sans-serif; background: var(--bg); overflow-x: hidden; }
        
        body::before { 
            content: ""; position: fixed; inset: 0; 
            background-image: linear-gradient(rgba(246,70,164,0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(246,70,164,0.05) 1px, transparent 1px); 
            background-size: 20px 20px; z-index: -1; 
        }

        #cloud-container {
            width: 100%;
            height: 35vh;
            position: relative;
            background: radial-gradient(circle, rgba(246,70,164,0.1) 0%, rgba(0,0,0,0) 70%);
            overflow: hidden;
        }
        #cloud { position: absolute; width: 100%; height: 100%; }

        .tag {
            position: absolute;
            text-decoration: none;
            text-shadow: 0 0 8px currentColor;
            white-space: nowrap;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        header { text-align: center; padding: 15px 0; }
        h1 { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--accent); margin: 0; text-shadow: 0 0 10px var(--accent); letter-spacing: 2px; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 0 10px; }
        
        .main-card { 
            background: rgba(10,10,20,0.95); 
            border-radius: 15px; 
            padding: 10px; 
            border: 1px solid rgba(246,70,164,0.3);
            position: relative;
            overflow: hidden;
        }

        .tg-window { 
            background: #000; 
            border-radius: 10px; 
            min-height: 480px; 
            position: relative;
            overflow: hidden;
        }

        /* ЗАГЛУШКА-ССЫЛКА (ВЕРХ) */
        .tg-link-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 65px; 
            z-index: 100;
            background: transparent;
            display: block;
        }

        /* ПОДНЯТЫЙ ПОДВАЛ (НИЗ) */
        .footer-shroud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px; /* ЕЩЁ ВЫШЕ, ЧТОБЫ ЗАКРЫТЬ ВСЁ ГОВНО */
            background: #05050a;
            border-top: 1px solid var(--accent);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
            letter-spacing: 2px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="cloud-container">
    <div id="cloud"></div>
</div>

<header>
    <h1>METAIMPERIYA</h1>
</header>

<div class="container">
    <div class="main-card">
        <div class="tg-window">
            
            <a href="https://t.me/SimsCreator/2" target="_blank" class="tg-link-overlay"></a>
            
            <script async src="https://telegram.org/js/telegram-widget.js?23"
                    data-telegram-discussion="SimsCreator/2"
                    data-comments-limit="5"
                    data-color="F646A4"
                    data-dark="1">
            </script>

            <div class="footer-shroud">ACCESS GRANTED: SimsCreator</div>
        </div>
    </div>
</div>

<div style="height: 60px;"></div>

<script>
    const config = {
        tags: [
            { text: "НЯНЯ", color: "#4267B2", size: 16 },
            { text: "БЕРЛИН", color: "#34A853", size: 14 },
            { text: "ГУВЕРНАНТКА", color: "#FF5733", size: 18 },
            { text: "МЮНХЕН", color: "#00FFFF", size: 20 },
            { text: "ГАМБУРГ", color: "#2965F1", size: 14 },
            { text: "3D ASSETS", color: "#F646A4", size: 20 },
            { text: "НЮРНБЕРГ", color: "#8A2BE2", size: 18 },
            { text: "GPT", color: "#10A37F", size: 16 },
            { text: "METAIMPERIYA", color: "#F646A4", size: 22 }
        ],
        radius: window.innerWidth < 500 ? 110 : 160,
        rotationSpeed: 0.0008,
        center: { x: window.innerWidth / 2, y: 150 },
        mouseSensitivity: 0.0001
    };

    const container = document.getElementById('cloud');
    let tags = [];
    let angleX = 0, angleY = 0, mouseX = 0, mouseY = 0;
    let isInteracting = false;

    config.tags.forEach((tag, i) => {
        const element = document.createElement('div');
        element.className = 'tag';
        element.textContent = tag.text;
        element.style.color = tag.color;
        element.style.fontSize = `${tag.size}px`;
        const phi = Math.acos(-1 + (2 * i) / config.tags.length);
        const theta = Math.sqrt(config.tags.length * Math.PI) * phi;
        element.dataset.x = config.radius * Math.cos(theta) * Math.sin(phi);
        element.dataset.y = config.radius * Math.sin(theta) * Math.sin(phi);
        element.dataset.z = config.radius * Math.cos(phi);
        container.appendChild(element);
        tags.push(element);
    });

    function animate() {
        if (isInteracting) {
            angleY += (mouseX - angleY) * config.mouseSensitivity;
            angleX += (mouseY - angleX) * config.mouseSensitivity;
        } else {
            angleY += config.rotationSpeed;
        }
        tags.forEach(tag => {
            const x = parseFloat(tag.dataset.x), y = parseFloat(tag.dataset.y), z = parseFloat(tag.dataset.z);
            const cosX = Math.cos(angleX), sinX = Math.sin(angleX), cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            const x1 = x * cosY - z * sinY, z1 = x * sinY + z * cosY;
            const y1 = y * cosX - z1 * sinX, z2 = y * sinX + z1 * cosX;
            const scale = config.radius / (config.radius + z2 + 80);
            tag.style.left = `${config.center.x + x1 * scale}px`;
            tag.style.top = `${config.center.y + y1 * scale}px`;
            tag.style.transform = `translate(-50%, -50%) scale(${scale})`;
            tag.style.opacity = 0.3 + scale;
        });
        requestAnimationFrame(animate);
    }

    animate();

    document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - config.center.x);
        mouseY = (e.clientY - config.center.y);
    });
    container.addEventListener('mouseenter', () => isInteracting = true);
    container.addEventListener('mouseleave', () => isInteracting = false);
</script>

</body>
</html>
