<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METAIMPERIYA JOBS CHAT</title>

<style>
body{
    margin:0;
    background:#020202;
    color:#fff;
    font-family:Arial;
}

header{
    text-align:center;
    padding:30px;
    border-bottom:1px solid #00ff9c;
}

h1{
    color:#00ff9c;
    margin:0;
}

.desc{
    color:#aaa;
    margin-top:10px;
}

.chat{
    max-width:800px;
    margin:20px auto;
    padding:10px;
}

.messages{
    height:400px;
    overflow-y:auto;
    border:1px solid #00ff9c;
    padding:10px;
    margin-bottom:10px;
}

.message{
    padding:10px;
    border-bottom:1px solid #333;
}

.input{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    background:#111;
    border:1px solid #00ff9c;
    color:#fff;
}

button{
    padding:12px;
    background:#00ff9c;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>METAIMPERIYA JOBS</h1>
<div class="desc">
GLOBAL JOB NETWORK • Пиши без регистрации • Все видят
</div>
</header>

<div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
        <input id="msg" placeholder="Напиши вакансию...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>
</div>

<!-- FIREBASE FIRESTORE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// 🔴 ВСТАВЬ СВОЙ CONFIG
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_PROJECT.firebaseapp.com",
  projectId: "ТВОЙ_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// загрузка сообщений
db.collection("chat").orderBy("time")
.onSnapshot(snapshot => {
    let box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
        let data = doc.data();
        box.innerHTML += `<div class="message">${data.text}</div>`;
    });

    box.scrollTop = box.scrollHeight;
});

// отправка
function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    db.collection("chat").add({
        text: input.value,
        time: Date.now()
    });

    input.value = "";
}
</script>

</body>
</html>
